# Copy and edit for your app EC2. See docs/aws-ec2-setup.md for Security Groups.
#
# SSH key: either pass `--private-key /path/to/key` (Jenkinsfile does this), or uncomment:
#   ansible_ssh_private_key_file=/var/lib/jenkins/.ssh/sewdl_app
#
[sewdl_app]
app ansible_host=REPLACE_WITH_APP_EC2_PUBLIC_OR_PRIVATE_IP ansible_user=ubuntu

[sewdl_app:vars]
ansible_python_interpreter=/usr/bin/python3
